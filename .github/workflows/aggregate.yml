name: V2Ray Subscription Aggregator

on:
  schedule:
    # 每天中午12:00 和 晚上22:00 (UTC+8) 各执行一次
    - cron: '0 4 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache xray-core binary
        uses: actions/cache@v4
        with:
          path: .xray
          key: xray-core-v25.10.15-linux-64

      - name: Run aggregator (两阶段测速：TCP/TLS初筛 + xray真实代理验证)
        run: |
          python v2ray_aggregator.py \
            --top 10 \
            --workers 30 \
            --ping-count 3 \
            --rounds 2 \
            --xray-candidates 50 \
            --verbose

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          # 只在有变化时提交
          git diff --staged --quiet || git commit -m "update: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
