name: V2Ray Subscription Aggregator

on:
  schedule:
    # 每 6 小时执行一次（UTC: 0/6/12/18 → 北京: 8/14/20/2）
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache xray-core binary
        uses: actions/cache@v4
        with:
          path: .xray
          key: xray-core-v25.10.15-linux-64

      - name: Run aggregator (TCP/TLS初筛 + xray真实代理验证，输出所有可用节点)
        run: |
          python v2ray_aggregator.py \
            --workers 30 \
            --ping-count 3 \
            --rounds 2 \
            --verbose

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          # 如果有 debug 目录（xray 崩溃现场），也提交上来
          if [ -d "debug" ]; then
            git add -f debug/
          fi
          # 只在有变化时提交
          git diff --staged --quiet || git commit -m "update: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
