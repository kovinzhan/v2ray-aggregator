# Nginx 配置示例
# 将订阅文件暴露为 HTTP 地址
# 放置于 /etc/nginx/conf.d/v2ray-sub.conf

server {
    listen 8080;
    server_name _;  # 替换为你的域名或IP

    # 订阅地址: http://你的IP:8080/sub
    location /sub {
        alias /opt/v2ray-aggregator/output/best_nodes.txt;
        default_type text/plain;
        add_header Content-Disposition 'inline';
        add_header Cache-Control 'no-cache';
    }

    # 测速报告: http://你的IP:8080/report
    location /report {
        alias /opt/v2ray-aggregator/output/report.json;
        default_type application/json;
    }
}
